      question: ทำไมแพทย์ไม่ตัดชิ้นเนื้อทั้งๆ ที่ Pap ผิดปกติ?
      answer: "เข้าใจว่าอยากให้ตัดเพื่อให้รู้ชัดเลย แต่มีเหตุผลทางการแพทย์ค่ะ \U0001F7E0<br><br>⚖️ <b>หลักการ \"ตัดเมื่อมีสิ่งที่ต้องตัด\"</b><br><br>\U0001F52D <b>Colposcopy ปกติ แปลว่า</b><br>• แพทย์มองไม่เห็นรอยโรคที่ชัดเจนพอที่จะตัด<br>• การตัดชิ้นเนื้อโดยไม่เห็นรอยโรคชัดๆ = เสี่ยงได้ผลลบลวง และมีผลข้างเคียง<br><br>❌ <b>Biopsy ที่ไม่มีเป้าหมายชัดเจน</b><br>• อาจตัดในตำแหน่งที่ไม่ใช่รอยโรคจริง<br>• มีผลข้างเคียง: เลือดออก เจ็บ แผล<br>• อาจได้ผล false negative<br><br>✅ <b>แผนปัจจุบัน: ติดตาม Co-testing</b><br>ถ้าครั้งถัดไป Pap ยังผิดปกติ หรือ HPV บวก แพทย์จะพิจารณา Colposcopy ซ้ำและอาจตัดชิ้นเนื้อค่ะ"
