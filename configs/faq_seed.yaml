      dx: d5
      category: การติดตาม
      question: ตรวจหลายครั้งแล้ว ยังต้องมาตรวจซ้ำอีกไหม?
      answer: "เข้าใจว่าเหนื่อยกับการตรวจบ้างค่ะ \U0001F7E0<br><br>\U0001F4A1 <b>เหตุผลที่ยังต้องติดตาม</b><br>• Pap ยังผิดปกติอยู่ แม้ Colpo ปกติ<br>• ยังต้องดูว่า Pap จะกลับมาปกติได้เองไหม<br>• หรือ HPV จะบวกขึ้นมาไหม<br><br>\U0001F4C5 <b>จะตรวจไปนานแค่ไหน?</b><br>• ถ้า Pap กลับมาปกติ + HPV ลบ → หยุดตรวจถี่ได้ค่ะ<br>• ส่วนใหญ่ใช้เวลา 1-2 ปีในการได้ผลดี<br>• แพทย์จะบอกคุณเมื่อกลับสู่ตารางปกติได้<br><br>✅ <b>ข้อดี</b><br>การติดตามต่อเนื่องทำให้มั่นใจได้ว่าทุกอย่างดีขึ้นหรือถ้ามีอะไรเปลี่ยนแปลงจะจับได้ไวมากค่ะ"
      quick_replies:
