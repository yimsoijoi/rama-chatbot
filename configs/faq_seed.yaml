      question: สาเหตุอื่นที่ทำให้ Pap ผิดปกติโดยไม่มี HPV มีอะไรบ้าง?
      answer: "มีหลายสาเหตุค่ะ \U0001F49A<br><br>\U0001F50D <b>สาเหตุที่พบบ่อย</b><br><br>\U0001F539 <b>การอักเสบ (Infection)</b><br>• เชื้อแบคทีเรีย (Bacterial vaginosis)<br>• เชื้อยีสต์ (Candida)<br>• Trichomonas<br><br>\U0001F539 <b>ฮอร์โมน</b><br>• วัยหมดประจำเดือน (Atrophic vaginitis)<br>• ผู้ที่กำลังให้นมบุตร<br>• การใช้ยาฮอร์โมน<br><br>\U0001F539 <b>อื่นๆ</b><br>• เซลล์ระคายเคืองจากห่วงอนามัย IUD<br>• เซลล์เยื่อบุมดลูก (Endometrial cells) หลุดออกมา<br>• คุณภาพการเก็บตัวอย่างวันนั้น<br><br>✅ ส่วนใหญ่สาเหตุเหล่านี้ไม่ร้ายแรง และหายได้เองค่ะ"
