      question: ควรบอกครอบครัวหรือคู่รักเรื่องผลตรวจนี้ไหม? (ทุก Diagnosis)
      answer: "เป็นการตัดสินใจส่วนตัวค่ะ ไม่มีใครบังคับได้ \U0001F499<br><br>\U0001F5E3️ <b>ข้อดีของการบอก</b><br>• ได้รับการสนับสนุนทางอารมณ์<br>• มีคนช่วยพาไปตรวจ ดูแลเมื่อกังวล<br>• คู่รักสามารถตรวจ HPV ได้เช่นกัน<br><br>\U0001F512 <b>ถ้ายังไม่พร้อมบอก</b><br>• เป็นสิทธิ์ของคุณ 100% ค่ะ<br>• ผลตรวจเหล่านี้ส่วนใหญ่ไม่ใช่โรคที่ต้องรีบแจ้งครอบครัวอย่างเร่งด่วน<br><br>\U0001F4A1 <b>ถ้าจะบอกคู่รัก อาจพูดว่า</b><br>\"ฉันตรวจพบสิ่งที่ต้องติดตาม ยังไม่ร้ายแรง แต่อยากให้รู้ไว้\"<br><br>\U0001F49C ถ้าต้องการคุยกับพยาบาลก่อนตัดสินใจ เราพร้อมรับฟังค่ะ"
