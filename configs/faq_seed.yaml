      question: Colposcopy คืออะไร แตกต่างจาก Pap อย่างไร?
      answer: "อธิบายให้ชัดเจนเลยค่ะ \U0001F7E0<br><br>\U0001F4CB <b>Pap smear</b><br>• ใช้ไม้เล็กๆ ป้ายเก็บเซลล์จากปากมดลูก<br>• ส่งไปตรวจที่ห้องแล็บ<br>• ผล: ปกติ / ผิดปกติ (ASCUS, LSIL, HSIL)<br>• เวลา: 5 นาที<br><br>\U0001F52D <b>Colposcopy</b><br>• ใช้กล้องขยาย (Colposcope) ส่องดูปากมดลูกโดยตรง<br>• แพทย์ทาสี (Acetic acid/Lugol's iodine) เพื่อดูรอยโรค<br>• เห็นได้ทันทีว่ามีรอยโรคไหม<br>• เวลา: 15-30 นาที<br>• อาจตัดชิ้นเนื้อถ้าพบรอยโรค<br><br>\U0001F3AF <b>ประสิทธิภาพ</b><br>Colposcopy เห็นได้ชัดกว่า Pap มากค่ะ ถือว่าเป็น Gold standard"
