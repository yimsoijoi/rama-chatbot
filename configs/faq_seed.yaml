      question: รู้สึกโกรธที่ต้องรอ ทำไมแพทย์ไม่รักษาตั้งแต่ต้น?
      answer: "ความรู้สึกโกรธของคุณเป็นเรื่องที่เข้าใจได้มากค่ะ \U0001F49C<br><br>ถ้าพบว่ามีอะไรในร่างกายแล้วบอกว่า \"รอดูก่อน\" มันน่าหงุดหงิดมากเลย ไม่ได้แปลว่าคุณคิดผิดนะคะ<br><br>\U0001F50D <b>เหตุผลที่แพทย์เลือกรอ (ไม่ใช่ไม่ใส่ใจ)</b><br>• CIN1 มีโอกาส 70-80% ที่จะหายเองค่ะ<br>• การรักษา (LEEP) มีผลข้างเคียง เช่น ปากมดลูกสั้น เสี่ยงคลอดก่อนกำหนด<br>• \"รักษาทุกคน\" = ทำให้คนที่จะหายเองต้องรับผลข้างเคียงโดยไม่จำเป็น<br><br>\U0001F6E1️ <b>คุณไม่ได้ถูกทิ้งไว้คนเดียว</b><br>แพทย์ตรวจติดตามทุก 6-12 เดือน และจะรักษาทันทีหากจำเป็นค่ะ<br><br>\U0001F49C ถ้ายังรู้สึกไม่มั่นใจ อยากคุยกับแพทย์โดยตรงเพื่อถามเพิ่มเติมได้เลยนะคะ"
