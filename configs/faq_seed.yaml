    - code: D5-Q7
      dx: d5
      category: การติดตาม
      question: ต้องมาตรวจซ้ำเมื่อไหร่? ตรวจ Pap หรือ Colposcopy อีกครั้ง?
      answer: "\U0001F4C5 <b>แผนการติดตามสำหรับกรณีของคุณค่ะ</b><br><br>สำหรับ Low-grade Pap + Colposcopy ปกติ (ไม่ตัดชิ้นเนื้อ):<br><br>\U0001F539 <b>6-12 เดือน</b> → <b>Co-test</b> (Pap + HPV)<br><br>\U0001F4CC <b>ผลที่เป็นไปได้</b><br>• ทั้ง Pap และ HPV ปกติ → กลับสู่การตรวจปกติ 3 ปี \U0001F389<br>• Pap ยังผิดปกติ หรือ HPV บวก → Colposcopy ซ้ำค่ะ<br><br>⚠️ <b>กรุณามาตามนัด</b><br>การติดตามต่อเนื่องเป็นแผนที่สำคัญที่สุดสำหรับกรณีของคุณค่ะ อย่าหยุดตรวจเองโดยไม่ปรึกษาแพทย์"
      quick_replies:
