      question: อาการแบบไหนที่ต้องรีบมาพบแพทย์ฉุกเฉิน? (ทุก Diagnosis)
      answer: "\U0001F6A8 <b>อาการฉุกเฉิน — มาพบแพทย์ทันที ไม่ต้องรอนัด</b><br><br>❗❗ <b>มาทันทีถ้ามี</b><br>• เลือดออกทางช่องคลอดมาก หรือ ไม่หยุด<br>• เลือดออกหลังมีเพศสัมพันธ์ ซ้ำๆ<br>• ตกขาวมีกลิ่นเหม็นรุนแรง สีผิดปกติ (เหลือง/เขียว/เทา)<br>• ปวดอุ้งเชิงกรานรุนแรง หรือรุนแรงขึ้นเรื่อยๆ<br>• มีไข้ > 38.5°C ร่วมกับปวดท้องน้อย<br>• อาการหลัง Biopsy: เลือดมาก ไข้ ปวดรุนแรง<br><br>\U0001F4DE <b>ติดต่อหน่วยก่อนมาค่ะ</b><br><b>เบอร์โทร: [ใส่เบอร์หน่วย]</b><br><br>\U0001F3E5 ถ้าอาการรุนแรงมาก ไปห้องฉุกเฉินได้เลยนะคะ"
