      question: ต้องมาตรวจซ้ำเมื่อไหร่ และตรวจอะไรบ้าง?
      answer: "\U0001F4C5 <b>แผนการติดตามสำหรับ CIN1 ค่ะ</b><br><br>\U0001F539 <b>6 เดือน</b> หลัง Biopsy → Co-test (Pap + HPV)<br>\U0001F539 <b>12 เดือน</b> → Co-test อีกครั้ง<br><br>\U0001F4CC <b>ผลที่เป็นไปได้ที่ 12 เดือน</b><br>• ทั้ง Pap และ HPV ปกติ → กลับตรวจตามปกติ 3 ปี \U0001F389<br>• ยังผิดปกติ → Colposcopy ซ้ำ<br>• พบ CIN2+ → วางแผนรักษา<br><br>⏰ <b>ถ้า CIN1 ยังคงอยู่นาน 2+ ปี</b><br>แพทย์อาจพิจารณารักษา (LEEP) เพื่อป้องกันไม่ให้รอนานเกินไปค่ะ<br><br>✅ ตารางนี้ออกแบบมาเพื่อจับการเปลี่ยนแปลงให้เร็วที่สุดค่ะ"
