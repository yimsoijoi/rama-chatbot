      question: มีโอกาสไหมที่ Colposcopy จะพลาด แล้วมีรอยโรคอยู่จริงๆ?
      answer: "ตอบตรงๆ ค่ะ \U0001F7E0 โอกาสมีน้อยมาก แต่ไม่ใช่ศูนย์<br><br>\U0001F4CA <b>ประสิทธิภาพของ Colposcopy</b><br>• Sensitivity: ~85-95% สำหรับ CIN2+<br>• พลาดได้ ~5-15% โดยเฉพาะรอยโรคขนาดเล็กมาก<br><br>\U0001F50D <b>ทำไมบางครั้งพลาด</b><br>• รอยโรคซ่อนอยู่ในคอมดลูก (ไม่เห็นตรงๆ)<br>• รอยโรคขนาด &lt;2 มม.<br>• รอยโรคกระจายหลายจุด<br><br>\U0001F6E1️ <b>ระบบป้องกันการพลาด</b><br>• ติดตาม Co-test ทุก 6-12 เดือน<br>• ถ้า Pap ยังผิดปกติ → Colposcopy ซ้ำ<br>• ระบบ \"net 2 ชั้น\" ที่ Pap + Colpo ช่วยกัน<br><br>✅ นั่นคือเหตุผลที่ต้องติดตามต่อแม้ Colpo ปกติค่ะ"
      quick_replies:
        - ตรวจซ้ำเมื่อไหร่?
        - รอยโรคในตำแหน่งที่มองไม่เห็น?
