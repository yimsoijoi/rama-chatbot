      question: ต้องมาตรวจซ้ำเมื่อไหร่? ตรวจ Pap อีกครั้งหรือเปล่า?
      answer: "\U0001F4C5 <b>แผนการติดตาม ASCUS HPV– ค่ะ</b><br><br>ตามแนวทาง ASCCP 2019:<br><br>\U0001F539 ตรวจซ้ำใน <b>3 ปี</b> (Pap smear อย่างเดียว หรือ Co-test)<br><br>⚡ <b>ยกเว้นถ้าคุณอยู่ในกลุ่มเสี่ยงสูงขึ้น</b><br>→ แพทย์อาจนัดเร็วกว่านี้ตาม clinical judgment<br><br>✅ <b>สิ่งที่ต้องทำ</b><br>• จดวันนัดครั้งถัดไปไว้<br>• มาตรวจตามนัดทุกครั้ง<br>• ถ้ามีอาการผิดปกติระหว่างรอ รีบมาก่อนนัดได้เลยค่ะ<br><br>\U0001F389 ข่าวดี: กรณีของคุณไม่ต้องตรวจบ่อยมากค่ะ"
