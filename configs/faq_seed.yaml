    - code: D5-Q10
      dx: d5
      category: สนับสนุนจิตใจ
      question: รู้สึกไม่มั่นใจในผลการตรวจ กังวลว่าแพทย์อาจพลาด
      answer: "รับรู้ว่ารู้สึกแบบนั้นนะคะ และเป็นเรื่องที่เข้าใจได้มากค่ะ \U0001F7E0<br><br>การได้ผลที่ \"ไม่แน่ชัด\" อย่าง Pap ผิดปกติแต่ Colpo ปกติ ทำให้รู้สึกไม่สบายใจได้มากเลย<br><br>\U0001F4A1 <b>สิ่งที่ควรรู้</b><br>• ความไม่สอดคล้องระหว่าง Pap กับ Colpo พบได้เป็นเรื่องปกติค่ะ<br>• Colposcopy โดยแพทย์ผู้เชี่ยวชาญมีความน่าเชื่อถือสูงมาก<br>• ระบบการติดตามออกแบบมาเพื่อ \"จับ\" ถ้ามีอะไรพลาดจริงๆ<br><br>\U0001F5E3️ <b>ถ้ายังไม่มั่นใจ</b><br>การขอ Second opinion จากแพทย์คนอื่นเป็นสิทธิ์ของคุณค่ะ และไม่ได้ผิดอะไร<br><br>\U0001F49C พูดคุยความกังวลนี้กับแพทย์หรือพยาบาลโดยตรงได้นะคะ เราพร้อมรับฟังค่ะ"
