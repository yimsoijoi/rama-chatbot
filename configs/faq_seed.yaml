      question: รู้สึกโล่งใจ แต่ยังไม่มั่นใจ 100% จะทำอย่างไร?
      answer: "ความรู้สึกแบบนี้เป็นเรื่องปกติมากค่ะ \U0001F49A<br><br>\"โล่งใจ แต่ยังไม่ 100%\" นี่คือความรู้สึกที่สมเหตุสมผลมากสำหรับคนที่เพิ่งได้รับข่าวผลตรวจ<br><br>\U0001F31F <b>สิ่งที่ช่วยสร้างความมั่นใจได้</b><br>• <b>ตัวเลข</b>: ความเสี่ยงของคุณ (~1-2%) ต่ำมากค่ะ<br>• <b>การกระทำ</b>: การมาตรวจตามนัดคือสิ่งที่ดีที่สุดที่ทำได้ตอนนี้ค่ะ<br>• <b>การรับรู้</b>: ความไม่แน่นอนเล็กน้อยยังคงมีอยู่เสมอ แต่แพทย์ดูแลคุณอยู่ค่ะ<br><br>\U0001F4A1 <b>ถ้ายังไม่มั่นใจ</b><br>ลองจดคำถามที่อยากถามแพทย์ในนัดถัดไปค่ะ การได้คุยกับแพทย์โดยตรงมักช่วยได้มากค่ะ"
