    - code: D5-Q8
      dx: d5
      category: Safety
      question: ระหว่างรอ มีอาการอะไรที่ต้องรีบพบแพทย์?
      answer: "\U0001F6A8 <b>อาการที่ต้องมาพบแพทย์ทันที</b><br><br>❗ <b>มาทันทีถ้ามี</b><br>• เลือดออกทางช่องคลอดผิดปกติ (ไม่ใช่ประจำเดือน)<br>• เลือดออกหลังมีเพศสัมพันธ์ ติดต่อกันหลายครั้ง<br>• ตกขาวผิดปกติ: มีกลิ่น สีเหลือง/เขียว/มีเลือดปน<br>• ปวดอุ้งเชิงกรานที่รุนแรงหรือต่อเนื่อง<br>• มีไข้สูงร่วมกับปวดท้องน้อย<br><br>\U0001F4DE ติดต่อหน่วย Colposcopy โดยตรงค่ะ ไม่ต้องรอวันนัด"
      quick_replies:
