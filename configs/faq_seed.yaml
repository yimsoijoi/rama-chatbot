      question: การมีเพศสัมพันธ์จะทำให้อาการแย่ลงไหม? (ทุก Diagnosis)
      answer: "\U0001F499 <b>โดยรวมมีเพศสัมพันธ์ได้ค่ะ แต่มีข้อแนะนำ</b><br><br>✅ <b>ทำได้</b><br>• มีเพศสัมพันธ์ได้ตามปกติ (ยกเว้นช่วงหลัง Biopsy 2 สัปดาห์)<br>• ไม่มีหลักฐานว่าการมีเพศสัมพันธ์ทำให้รอยโรคแย่ลงโดยตรง<br><br>\U0001F6E1️ <b>แนะนำ</b><br>• ใช้ถุงยางอนามัย — ลดความเสี่ยงรับ HPV สายพันธุ์ใหม่<br>• แจ้งคู่รักให้ทราบ<br><br>❌ <b>งดหลัง Biopsy 2 สัปดาห์</b><br>เพื่อให้แผลหายดีก่อนค่ะ<br><br>⚠️ <b>ถ้ามีอาการเหล่านี้หลังมีเพศสัมพันธ์</b><br>• เลือดออก (ไม่ใช่ประจำเดือน)<br>• เจ็บปวดมาก<br>→ มาพบแพทย์ค่ะ"
