    - code: D5-Q6
      dx: d5
      category: ความน่าเชื่อถือ
      question: ถ้ารอยโรคอยู่ในตำแหน่งที่มองไม่เห็น จะรู้ได้อย่างไร?
      answer: "แพทย์มีวิธีรับมือค่ะ \U0001F7E0<br><br>\U0001F50D <b>ตำแหน่งที่ Colposcope มองยาก</b><br>• Squamocolumnar junction (SCJ) ที่อยู่ลึกในคอมดลูก<br>• พบบ่อยในผู้หญิงอายุมากขึ้น หรือหลังวัยหมดประจำเดือน<br><br>\U0001F6E0️ <b>วิธีที่แพทย์ใช้เสริม</b><br>• <b>Endocervical Curettage (ECC)</b> — ขูดเก็บเซลล์จากในคอมดลูก<br>• <b>ดู Pap ต่อเนื่อง</b> — ถ้ายังผิดปกติซ้ำๆ = สัญญาณว่ามีอะไรบางอย่าง<br>• <b>Colposcopy ซ้ำ</b> โดยผู้เชี่ยวชาญ<br><br>\U0001F4CB ถ้า Colposcopy ของคุณ \"ประเมินไม่ได้เพียงพอ\" (Unsatisfactory) แพทย์จะแจ้งและวางแผนต่อค่ะ<br><br>✅ ระบบมีชั้นความปลอดภัยหลายชั้นค่ะ"
