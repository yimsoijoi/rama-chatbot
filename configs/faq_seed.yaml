items:
    - code: D1-Q1
      dx: d1
      category: ความเข้าใจผล
      question: ผล Pap ปกติ แต่ทำไมแพทย์บอกว่ามี HPV?
      answer: "เข้าใจเลยค่ะ ฟังดูน่าสับสนมากเลย \U0001F499<br><br>Pap smear และ HPV เป็นการตรวจคนละอย่างกันนะคะ<br><br>\U0001F52C <b>Pap smear</b> ตรวจดูว่า<u>เซลล์ปากมดลูกเปลี่ยนแปลงไปไหม</u> — ผลของคุณ \"ปกติ\" แปลว่าตอนนี้เซลล์ยังดีอยู่ค่ะ ✅<br><br>\U0001F9A0 <b>HPV test</b> ตรวจดูว่า<u>มีไวรัส HPV อยู่ในร่างกายไหม</u> — ผลของคุณพบ HPV สายพันธุ์ความเสี่ยงสูงค่ะ<br><br>ดังนั้น Pap ปกติ + HPV บวก แปลว่า \"ตอนนี้ยังไม่มีรอยโรค แต่มีไวรัสอยู่\" ค่ะ ซึ่งพบได้บ่อยในผู้หญิงวัยเจริญพันธุ์นะคะ"
      quick_replies:
        - HPV หายเองได้ไหม?
        - ทำไมไม่รักษา?
        - ต้องมาตรวจซ้ำเมื่อไหร่?
      match_phrases:
        - D1-Q1
        - ผล Pap ปกติ แต่ทำไมแพทย์บอกว่ามี HPV?
    - code: D1-Q2
      dx: d1
      category: ความรู้
      question: HPV other high risk คืออะไร ต่างจาก HPV 16/18 อย่างไร?
      answer: "HPV มีมากกว่า 200 สายพันธุ์ค่ะ แบ่งเป็น<br><br>\U0001F534 <b>สายพันธุ์ความเสี่ยงสูงมาก</b> (HPV 16, 18) — เสี่ยงต่อมะเร็งมากที่สุด<br><br>\U0001F7E1 <b>สายพันธุ์ความเสี่ยงสูงอื่นๆ</b> (เช่น 31, 33, 45, 52, 58) — นี่คือกลุ่มของคุณค่ะ เสี่ยงน้อยกว่า 16/18 แต่ยังต้องติดตามอยู่<br><br>\U0001F7E2 <b>สายพันธุ์ความเสี่ยงต่ำ</b> (HPV 6, 11) — ไม่ก่อมะเร็ง<br><br>การที่ผลของคุณเป็น \"other high risk\" แปลว่าอยู่ในกลุ่มที่ต้องระวัง แต่ไม่ใช่กลุ่มที่เสี่ยงสูงที่สุดค่ะ"
      quick_replies:
        - HPV หายเองได้ไหม?
        - ตรวจซ้ำเมื่อไหร่?
      match_phrases:
        - D1-Q2
        - HPV other high risk คืออะไร ต่างจาก HPV 16/18 อย่างไร?
    - code: D1-Q3
      dx: d1
      category: การพยากรณ์โรค
      question: ถ้า Pap ปกติ แล้ว HPV จะหายเองได้ไหม?
      answer: "ข่าวดีค่ะ! \U0001F31F<br><br>ร่างกายเรามีภูมิคุ้มกันที่สามารถกำจัด HPV เองได้นะคะ<br><br>\U0001F4CA จากงานวิจัย:<br>• <b>~80-90%</b> ของผู้ที่ติด HPV จะกำจัดไวรัสได้เองภายใน <b>1-2 ปี</b><br>• สำหรับ HPV other high risk โอกาสหายเองก็ยังค่อนข้างสูงค่ะ<br><br>\U0001F6E1️ ร่างกายจะสู้ได้ดีขึ้นถ้า:<br>• นอนหลับพักผ่อนเพียงพอ<br>• ไม่สูบบุหรี่ (บุหรี่ลดภูมิคุ้มกัน)<br>• ดูแลสุขภาพโดยรวม<br><br>แต่ต้องติดตามด้วยการตรวจซ้ำตามนัดนะคะ เพื่อให้แน่ใจว่าทุกอย่างเป็นปกติค่ะ"
      quick_replies:
        - ตรวจซ้ำเมื่อไหร่?
        - ระหว่างรอต้องระวังอะไร?
      match_phrases:
        - D1-Q3
        - ถ้า Pap ปกติ แล้ว HPV จะหายเองได้ไหม?
    - code: D1-Q4
      dx: d1
      category: เหตุผลการรักษา
      question: ทำไมแพทย์ไม่รักษา ทั้งๆ ที่ HPV บวก?
      answer: "เหตุผลดีมากที่ถามนะคะ \U0001F499<br><br>ณ ตอนนี้ยังไม่มียาที่กำจัด HPV ไวรัสได้โดยตรงค่ะ สิ่งที่ \"รักษา\" ได้จริงๆ คือ<u>รอยโรคที่เซลล์ผิดปกติ</u> ไม่ใช่ตัวไวรัส<br><br>เนื่องจากผล Pap ของคุณยังปกติ แสดงว่าตอนนี้เซลล์ยังไม่เปลี่ยนแปลง จึงยังไม่มีรอยโรคที่จะรักษาค่ะ<br><br>✅ แผนที่ดีที่สุดตอนนี้คือ:<br>1. ให้ร่างกายสู้กับ HPV เอง<br>2. ตรวจติดตามตามนัด เพื่อดูว่าเซลล์เปลี่ยนแปลงไหม<br>3. ถ้าเกิดรอยโรค แพทย์จะรักษาทันทีค่ะ"
      quick_replies:
        - HPV หายเองได้ไหม?
        - ตรวจซ้ำเมื่อไหร่?
      match_phrases:
        - D1-Q4
        - ทำไมแพทย์ไม่รักษา ทั้งๆ ที่ HPV บวก?
    - code: D1-Q5
      dx: d1
      category: การติดตาม
      question: ต้องมาตรวจซ้ำเมื่อไหร่ และตรวจอะไรบ้าง?
      answer: "\U0001F4C5 แผนการตรวจติดตามของคุณค่ะ<br><br>สำหรับ NILM + HPV other high risk แนวทางทั่วไปคือ:<br><br>\U0001F539 <b>12 เดือน</b> หลังการตรวจครั้งนี้ → <b>Co-testing</b> (Pap + HPV ใหม่)<br><br>\U0001F4CC ผลที่เป็นไปได้:<br>• HPV หาย + Pap ปกติ → กลับสู่การตรวจตามปกติ 3 ปีค่ะ \U0001F389<br>• HPV ยังบวกอยู่ → อาจส่งต่อเพื่อทำ Colposcopy เพิ่มเติม<br><br>⚠️ กรุณามาตามนัดทุกครั้งนะคะ การติดตามสม่ำเสมอคือสิ่งสำคัญที่สุดค่ะ"
      quick_replies:
        - ระหว่างรอต้องระวังอะไร?
        - ยังมีเพศสัมพันธ์ได้ไหม?
      match_phrases:
        - D1-Q5
        - ต้องมาตรวจซ้ำเมื่อไหร่ และตรวจอะไรบ้าง?
    - code: D1-Q6
      dx: d1
      category: การดูแลตัวเอง
      question: ระหว่างรอตรวจซ้ำ ต้องระวังอะไรบ้าง?
      answer: "ขอบคุณที่ใส่ใจดูแลตัวเองค่ะ \U0001F33F<br><br>สิ่งที่ช่วยให้ร่างกายสู้กับ HPV ได้ดีขึ้น:<br><br>✅ <b>ทำได้เลย</b><br>• นอนหลับ 7-8 ชั่วโมง<br>• กินผักผลไม้ให้เพียงพอ<br>• ออกกำลังกายสม่ำเสมอ<br>• จัดการความเครียด<br><br>❌ <b>ควรหลีกเลี่ยง</b><br>• สูบบุหรี่ (ลดภูมิคุ้มกันปากมดลูกโดยตรง)<br>• ดื่มแอลกอฮอล์มากเกินไป<br><br>\U0001F6A8 <b>ถ้ามีอาการเหล่านี้ รีบพบแพทย์ทันที</b><br>• เลือดออกผิดปกติทางช่องคลอด<br>• ตกขาวมีกลิ่น/สีผิดปกติ<br>• ปวดอุ้งเชิงกรานผิดปกติ"
      quick_replies:
        - ยังมีเพศสัมพันธ์ได้ไหม?
        - บอกแฟนได้ไหม?
      match_phrases:
        - D1-Q6
        - ระหว่างรอตรวจซ้ำ ต้องระวังอะไรบ้าง?
    - code: D1-Q7
      dx: d1
      category: การส่งต่อเชื้อ
      question: ควรบอกแฟนได้ไหม? จะติดต่อให้แฟนได้อย่างไร?
      answer: "เป็นคำถามที่ดีมากค่ะ และแสดงถึงความรับผิดชอบ \U0001F499<br><br>\U0001F5E3️ <b>การบอกคู่รัก</b><br>แนะนำให้แจ้งนะคะ เพราะ HPV ติดต่อทางเพศสัมพันธ์ คู่รักควรรู้เพื่อ:<br>• พิจารณาตรวจ HPV (ถ้าเป็นผู้หญิง)<br>• พิจารณาฉีดวัคซีน<br>• ใช้ถุงยางอนามัยเพื่อลดความเสี่ยง<br><br>\U0001F4AC <b>วิธีบอก</b><br>อาจพูดว่า \"ฉันตรวจพบ HPV ซึ่งพบได้บ่อยมาก เราควรคุยกับแพทย์ด้วยกัน\"<br><br>⚠️ <b>สิ่งสำคัญ</b><br>HPV พบได้ในผู้ใหญ่ส่วนใหญ่ที่เคยมีเพศสัมพันธ์แล้วค่ะ ไม่ได้แปลว่าใครไม่ซื่อสัตย์"
      quick_replies:
        - ยังมีเพศสัมพันธ์ได้ไหม?
        - ลูกสาวควรฉีดวัคซีนไหม?
      match_phrases:
        - D1-Q7
        - ควรบอกแฟนได้ไหม? จะติดต่อให้แฟนได้อย่างไร?
    - code: D1-Q8
      dx: d1
      category: คุณภาพชีวิต
      question: ยังมีเพศสัมพันธ์ได้ไหมขณะที่ HPV บวก?
      answer: "มีเพศสัมพันธ์ได้ค่ะ ไม่ได้ห้ามค่ะ \U0001F499<br><br>แต่มีข้อแนะนำดังนี้:<br><br>\U0001F6E1️ <b>ใช้ถุงยางอนามัย</b> — ลดความเสี่ยงการถ่ายทอดให้คู่รัก (แต่ไม่ได้ป้องกัน 100% เพราะ HPV ติดต่อทางผิวหนัง)<br><br>\U0001F4CB <b>แจ้งคู่รักให้ทราบ</b> — เพื่อให้เขา/เธอสามารถตรวจหรือฉีดวัคซีนได้<br><br>\U0001F6AD <b>งดสูบบุหรี่</b> — ช่วยให้ภูมิคุ้มกันปากมดลูกแข็งแกร่งขึ้น<br><br>ไม่ต้องโดดเดี่ยวตัวเองนะคะ HPV พบได้ในผู้ใหญ่ส่วนใหญ่ค่ะ"
      quick_replies:
        - บอกแฟนได้ไหม?
        - ลูกสาวควรฉีดวัคซีนไหม?
      match_phrases:
        - D1-Q8
        - ยังมีเพศสัมพันธ์ได้ไหมขณะที่ HPV บวก?
    - code: D1-Q9
      dx: d1
      category: การป้องกัน
      question: ถ้าลูกสาวยังไม่ได้ฉีดวัคซีน ควรฉีดไหม?
      answer: "แนะนำให้ฉีดเลยค่ะ! \U0001F489<br><br>✅ <b>วัคซีน HPV ได้ผลดีที่สุดเมื่อ</b><br>• ฉีดก่อนเริ่มมีเพศสัมพันธ์ (อายุ 9-14 ปี)<br>• แต่ยังฉีดได้ถึงอายุ 26 ปี และบางกรณีถึง 45 ปีค่ะ<br><br>\U0001F6E1️ <b>วัคซีนป้องกัน</b><br>• HPV 16, 18 → ป้องกันมะเร็งปากมดลูก 70%<br>• HPV 6, 11, 16, 18, 31, 33, 45, 52, 58 (วัคซีน 9 สายพันธุ์)<br><br>\U0001F48A <b>ตาราง</b><br>• อายุ <15 ปี: 2 เข็ม ห่างกัน 6 เดือน<br>• อายุ ≥15 ปี: 3 เข็ม (0, 1-2, 6 เดือน)<br><br>ติดต่อโรงพยาบาลหรือคลินิกใกล้บ้านได้เลยค่ะ"
      quick_replies:
        - มีคำถามอื่นอีกไหม?
      match_phrases:
        - D1-Q9
        - ถ้าลูกสาวยังไม่ได้ฉีดวัคซีน ควรฉีดไหม?
    - code: D1-Q10
      dx: d1
      category: สนับสนุนจิตใจ
      question: ฉันรู้สึกกังวลมากแม้ผล Pap ปกติ ปกติไหม?
      answer: "รู้สึกแบบนั้นได้เลยนะคะ เป็นเรื่องปกติมากค่ะ \U0001F499<br><br>การได้ยินว่า \"HPV บวก\" ทำให้กังวลได้มากเลย แม้ว่า Pap จะปกติก็ตาม<br><br>\U0001F31F <b>สิ่งที่ควรรู้</b><br>• HPV พบในผู้ใหญ่ส่วนใหญ่ที่มีเพศสัมพันธ์แล้ว<br>• Pap ปกติ + ติดตามตามนัด = คุณทำสิ่งที่ดีที่สุดแล้วค่ะ<br>• ความกังวลไม่ได้ช่วยให้ร่างกายสู้ HPV ได้ดีขึ้น แต่การพักผ่อนเพียงพอช่วยได้ค่ะ<br><br>\U0001F49C ถ้ายังรู้สึกกังวลมาก ลองพูดคุยกับพยาบาลประจำหน่วยได้นะคะ เราพร้อมรับฟังค่ะ"
      quick_replies:
        - คุยกับเจ้าหน้าที่
        - มีคำถามอื่นอีกไหม?
      match_phrases:
        - D1-Q10
        - ฉันรู้สึกกังวลมากแม้ผล Pap ปกติ ปกติไหม?
    - code: D2-Q1
      dx: d2
      category: ความเข้าใจผล
      question: LSIL คืออะไร หมายความว่าฉันกำลังจะเป็นมะเร็งไหม?
      answer: "เข้าใจว่าได้ยินคำนี้แล้วกังวลมากเลยนะคะ \U0001F499 ขออธิบายให้ชัดเจนค่ะ<br><br>\U0001F52C <b>LSIL ย่อมาจาก Low-grade Squamous Intraepithelial Lesion</b><br>แปลว่า \"เซลล์ผิดปกติระดับต่ำ\" ค่ะ<br><br>⚠️ <b>ยังไม่ใช่มะเร็ง</b> LSIL อยู่ห่างจากมะเร็งมากค่ะ เป็นเหมือนสัญญาณเตือนระดับแรกสุด<br><br>\U0001F4CA <b>สถิติที่ควรรู้</b><br>• <b>60-70%</b> ของ LSIL <u>หายเองได้</u>ภายใน 1-2 ปี<br>• ~20% คงที่ ไม่เปลี่ยนแปลง<br>• ~10% อาจลุกลามเป็น CIN2+ (ต้องรักษา)<br>• โอกาสกลายเป็นมะเร็งโดยตรงน้อยมาก<br><br>✅ การที่แพทย์ตรวจพบในระยะนี้ถือว่าดีมากค่ะ"
      quick_replies:
        - ทำไมไม่รักษาทันที?
        - หายเองได้มากแค่ไหน?
        - Colposcopy คืออะไร?
      match_phrases:
        - D2-Q1
        - LSIL คืออะไร หมายความว่าฉันกำลังจะเป็นมะเร็งไหม?
    - code: D2-Q2
      dx: d2
      category: เหตุผลการรักษา
      question: ทำไมแพทย์ไม่รักษาเลย ต้องรอดูอะไรอยู่?
      answer: "เหตุผลที่รอดูเพราะแพทย์คำนึงถึงประโยชน์และความเสี่ยงค่ะ \U0001F499<br><br>\U0001F3AF <b>เหตุผลหลัก</b><br>• LSIL ส่วนใหญ่ (60-70%) <b>หายเองได้</b> ในเวลาสั้นๆ<br>• การรักษา เช่น จี้ไฟฟ้า หรือ LEEP อาจทำให้ปากมดลูกอ่อนแอลง มีผลต่อการตั้งครรภ์<br>• การรักษาเกินความจำเป็นมีผลข้างเคียงที่ไม่คุ้ม<br><br>⚖️ <b>หลักการ</b><br>\"รักษาเมื่อจำเป็น ไม่รักษาเกินความจำเป็น\"<br><br>✅ แผนปัจจุบัน: ติดตามด้วย Colposcopy เพื่อดูให้ชัดขึ้น แพทย์จะรักษาทันทีถ้าจำเป็นค่ะ"
      quick_replies:
        - หายเองได้มากแค่ไหน?
        - Colposcopy คืออะไร?
      match_phrases:
        - D2-Q2
        - ทำไมแพทย์ไม่รักษาเลย ต้องรอดูอะไรอยู่?
    - code: D2-Q3
      dx: d2
      category: การพยากรณ์โรค
      question: LSIL มีโอกาสหายเองได้มากแค่ไหน?
