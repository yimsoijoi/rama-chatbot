      question: ต้องการคุยกับเจ้าหน้าที่โดยตรง
      answer: "\U0001F499 <b>รับทราบค่ะ กำลังเชื่อมต่อให้นะคะ</b><br><br>\U0001F469‍⚕️ <b>บุคลากรที่พร้อมช่วยคุณ</b><br>• พยาบาลประจำหน่วย Colposcopy<br>• นักวิชาชีพที่ผ่านการฝึกอบรม<br><br>\U0001F550 <b>เวลาทำการ</b><br>• จันทร์–ศุกร์ 08:00–16:00 น.<br>• นอกเวลา: โทรฉุกเฉิน [เบอร์]<br><br>\U0001F4E8 <b>สิ่งที่เกิดขึ้นต่อไป</b><br>เจ้าหน้าที่จะเห็นประวัติการสนทนาของคุณ และจะติดต่อกลับภายใน [X] ชั่วโมงในเวลาทำการค่ะ<br><br>\U0001F49C คุณไม่ได้อยู่คนเดียวค่ะ"
      quick_replies:
        - กลับหน้าหลัก
      match_phrases:
        - S6
        - ต้องการคุยกับเจ้าหน้าที่โดยตรง
