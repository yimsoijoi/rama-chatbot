      question: Colposcopy ปกติ แต่ Pap ยังผิดปกติ เชื่อถือผลไหนได้มากกว่า?
      answer: "คำถามที่ดีมากค่ะ และเข้าใจว่าสับสนแน่ๆ \U0001F7E0<br><br>\U0001F52C <b>ทำความเข้าใจก่อนนะคะ</b><br><br>\U0001F4CB <b>Pap smear</b><br>• Sensitivity: ~55-80% (อาจพลาดรอยโรคจริงได้)<br>• เป็น \"net\" ที่จับผิดปกติแบบกว้างๆ บางครั้งอ่านผิดพลาดได้ค่ะ<br><br>\U0001F52D <b>Colposcopy</b><br>• แพทย์มองเห็นปากมดลูกโดยตรง<br>• Specificity สูงกว่า — ถ้า Colpo ปกติ มักแปลว่าปกติจริงๆ<br><br>✅ <b>โดยรวม Colposcopy ให้ข้อมูลที่ชัดเจนกว่าค่ะ</b><br>แต่การที่ Pap ผิดปกติก็ยังต้องติดตามต่อ เผื่อรอยโรคเล็กมากที่ยังมองไม่เห็น"
