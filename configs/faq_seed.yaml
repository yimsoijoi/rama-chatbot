      question: อาการแบบไหนที่ต้องรีบกลับมาพบแพทย์ก่อนนัด?
      answer: "\U0001F6A8 <b>อาการที่ต้องมาพบแพทย์ทันที</b><br><br>❗ <b>มาทันที ถ้ามีอาการเหล่านี้หลัง Biopsy</b><br>• เลือดออกทางช่องคลอด<b>มากกว่าประจำเดือน</b><br>• มีไข้ > 38°C ร่วมกับปวดท้องน้อย<br>• ตกขาวมีกลิ่นเหม็นผิดปกติ สีเหลือง/เขียว<br>• ปวดท้องน้อยรุนแรง หรือรุนแรงขึ้นเรื่อยๆ<br>• เลือดออกนาน > 2 สัปดาห์หลัง Biopsy<br><br>❗ <b>มาทันที ถ้ามีอาการเหล่านี้ระหว่างติดตาม</b><br>• เลือดออกผิดปกติ (ไม่ใช่ประจำเดือน)<br>• ปวดอุ้งเชิงกรานต่อเนื่อง<br>• เลือดออกหลังมีเพศสัมพันธ์<br><br>\U0001F4DE ติดต่อหน่วย Colposcopy ก่อนมาค่ะ"
