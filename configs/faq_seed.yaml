      answer: "\U0001F6A8 <b>อาการที่ต้องมาพบแพทย์ก่อนนัดค่ะ</b><br><br>❗ <b>มาทันทีถ้ามี</b><br>• เลือดออกทางช่องคลอดผิดปกติ (ไม่ใช่ประจำเดือน)<br>• เลือดออกหลังมีเพศสัมพันธ์<br>• ตกขาวมีกลิ่นผิดปกติ สีผิดปกติ (เหลือง/เขียว/เทา)<br>• ปวดอุ้งเชิงกรานที่รุนแรงหรือต่อเนื่อง<br>• มีไข้สูง<br><br>\U0001F4A1 <b>กรณีของคุณ</b><br>ความเสี่ยงต่ำมาก แต่ร่างกายจะส่งสัญญาณถ้ามีอะไรผิดปกติค่ะ<br><br>\U0001F4DE ติดต่อคลินิกได้ตามเวลาทำการนะคะ"
