      question: ฉีดวัคซีน HPV ตอนนี้ยังได้ประโยชน์ไหม? (ทุก Diagnosis)
      answer: "\U0001F489 <b>คำตอบขึ้นอยู่กับอายุของคุณค่ะ</b><br><br>✅ <b>อายุ 9-26 ปี</b> — แนะนำให้ฉีดเลยค่ะ ได้ประโยชน์เต็มที่<br>✅ <b>อายุ 27-45 ปี</b> — ยังได้ประโยชน์บ้าง โดยเฉพาะถ้ายังไม่ติด HPV ทุกสายพันธุ์<br>❓ <b>อายุ > 45 ปี</b> — ประโยชน์ลดลง ปรึกษาแพทย์เป็นรายๆ ไปค่ะ<br><br>⚠️ <b>กรณีที่ตรวจพบ HPV แล้ว</b><br>• วัคซีนยังป้องกันสายพันธุ์อื่นที่ยังไม่ติดได้<br>• แต่ไม่ได้รักษาหรือกำจัด HPV ที่มีอยู่แล้ว<br><br>\U0001F4CB <b>ตาราง</b><br>• อายุ &lt;15 ปี: 2 เข็ม<br>• อายุ ≥15 ปี: 3 เข็ม (0, 1-2, 6 เดือน)<br><br>แนะนำให้ปรึกษาแพทย์ในนัดถัดไปด้วยนะคะ"
