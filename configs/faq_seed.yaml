      answer: "ปกติค่ะ ไม่ต้องกังวล \U0001F49C<br><br>✅ <b>อาการที่ปกติหลัง Biopsy (1-2 สัปดาห์แรก)</b><br>• ตกขาวสีน้ำตาล/ดำ (จากยาสมาน)<br>• เลือดออกเล็กน้อย ไม่มากกว่าประจำเดือน<br>• รู้สึกไม่สบายเล็กน้อยบริเวณท้องน้อย<br><br>❌ <b>งดในช่วง 2 สัปดาห์แรก</b><br>• การมีเพศสัมพันธ์<br>• แช่น้ำ/ว่ายน้ำ<br>• ยกของหนัก<br><br>\U0001F6A8 <b>มาพบแพทย์ทันทีถ้า</b><br>• เลือดออกมากกว่าประจำเดือน<br>• มีไข้ > 38°C<br>• ตกขาวมีกลิ่นเหม็นมาก<br>• ปวดท้องรุนแรงขึ้นเรื่อยๆ"
